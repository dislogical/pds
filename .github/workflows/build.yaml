name: Build

on:
  - push
  - pull_request

jobs:
  Vite:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        name: Install pnpm
        with:
          run_install: true
          cache: true

      - run: pnpm run build
