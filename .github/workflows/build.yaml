name: Build

on:
  - push
  - pull_request

jobs:
  vite:
    name: Vite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        name: Install pnpm
        with:
          run_install: true
          cache: true

      - run: pnpm run build
